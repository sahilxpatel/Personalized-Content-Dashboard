name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        # use npm install to avoid lockfile/workspace issues in CI
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Build
        run: npm run build
